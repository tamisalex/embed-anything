name: Docker Image CI

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:                         # List of steps in the job
      - name: Checkout code
        uses: actions/checkout@v4  # Use a pre-built action
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4 # More information on this action can be found below in the 'AWS Credentials' section
        with:
          role-to-assume: arn:aws:iam::495199591388:role/embed-everything-github-action
          aws-region: aws-region-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build embed-anything/pipeline
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: embed-anything/pipeline
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f packages/embed-api/Dockerfile --build-arg PROVIDER=clip -t $REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
 

      - name: Build embed-anything/api
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: embed-anything/api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f packages/embed-api/Dockerfile --build-arg PROVIDER=clip -t $REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

