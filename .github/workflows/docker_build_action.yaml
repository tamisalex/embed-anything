name: Docker Image CI

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/powershell \
            /usr/share/swift /usr/local/.ghcup
          docker image prune -af
          df -h

      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Debug OIDC token
        run: |
          TOKEN=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo $TOKEN | cut -d. -f2 | base64 -d 2>/dev/null | jq .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4 # More information on this action can be found below in the 'AWS Credentials' section
        with:
          role-to-assume: arn:aws:iam::495199591388:role/ea-dev-github-actions
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build embed-anything/embed-pipeline
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: embed-anything/embed-pipeline
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f packages/embed-pipeline/Dockerfile --build-arg PROVIDER=clip -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -t $REGISTRY/$REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

      - name: Build embed-anything/embed-api
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: embed-anything/embed-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f packages/embed-api/Dockerfile --build-arg PROVIDER=clip -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -t $REGISTRY/$REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

  deploy-api:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::495199591388:role/ea-dev-github-actions
          aws-region: us-east-1

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster ea-dev-api-cluster \
            --service ea-dev-api \
            --force-new-deployment \
            --region us-east-1

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster ea-dev-api-cluster \
            --services ea-dev-api \
            --region us-east-1

  deploy-prefect:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install prefect
        run: uv tool install prefect

      - name: Set Prefect pipeline config variable
        working-directory: packages/embed-pipeline
        env:
          PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
        run: prefect variable set embed_pipeline_config "$(cat config/pipeline_config.json)" --overwrite

      - name: Deploy Prefect flow
        working-directory: packages/embed-pipeline
        env:
          PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
        run: prefect deploy --all --no-prompt
